<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exploration Asset Tracking</title>
  <style>
    :root {
      --ink: #24312d;
      --muted: #66736e;
      --paper: #f5f1e8;
      --panel: #fffdf8;
      --line: #d9d2c4;
      --green: #315f52;
      --green-soft: #dce9e2;
      --gold: #a66b24;
      --gold-soft: #f5e7cb;
      --red: #9c463f;
      --red-soft: #f4deda;
      --shadow: 0 18px 45px rgba(36,49,45,.12);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 88% 8%, rgba(166,107,36,.11), transparent 27rem),
        var(--paper);
      font: 15px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    header {
      border-bottom: 1px solid rgba(49,95,82,.16);
      background: rgba(245,241,232,.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: var(--green);
      color: white;
      font-weight: 800;
      letter-spacing: -.04em;
    }
    .brand h1 { margin: 0; font: 700 19px/1.15 Georgia, serif; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .source-pill {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
    }
    main { padding: 34px 0 64px; }
    .workspace {
      background: rgba(255,253,248,.78);
      border: 1px solid rgba(217,210,196,.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 16px 18px 0;
      border-bottom: 1px solid var(--line);
    }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 11px 16px 13px;
      border-bottom: 3px solid transparent;
      font-weight: 700;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-count {
      display: inline-grid;
      min-width: 23px;
      height: 23px;
      place-items: center;
      margin-left: 7px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ebe5da;
      font-size: 12px;
    }
    .tab.active .tab-count { background: var(--green-soft); }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 190px 190px;
      gap: 12px;
      padding: 18px;
      background: rgba(255,255,255,.42);
    }
    .control {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
    }
    .control:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(49,95,82,.12); }
    .list-head {
      display: grid;
      grid-template-columns: 1fr 145px 130px 32px;
      gap: 14px;
      padding: 11px 20px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .asset-list { min-height: 320px; }
    .asset-row {
      display: grid;
      grid-template-columns: 1fr 145px 130px 32px;
      gap: 14px;
      align-items: center;
      width: 100%;
      padding: 17px 20px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: inherit;
      text-align: left;
    }
    .asset-row:hover, .asset-row:focus-visible { background: #f8f4eb; outline: none; }
    .asset-row:last-child { border-bottom: 0; }
    .asset-main { min-width: 0; }
    .asset-title {
      margin: 0 0 5px;
      overflow: hidden;
      font-weight: 750;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .asset-meta { color: var(--muted); font-size: 13px; }
    .category-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 7px;
      border-radius: 50%;
      background: var(--gold);
      vertical-align: 1px;
    }
    .date-cell { color: var(--muted); font-size: 13px; }
    .status {
      display: inline-flex;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
    }
    .status.pending { color: #78501e; background: var(--gold-soft); }
    .status.approved { color: #285347; background: var(--green-soft); }
    .status.not_approved { color: #843b35; background: var(--red-soft); }
    .chevron { color: var(--muted); font-size: 20px; text-align: right; }
    .empty { padding: 76px 24px; color: var(--muted); text-align: center; }
    .empty strong { display: block; margin-bottom: 5px; color: var(--ink); }
    .error { color: var(--red); }
    dialog {
      width: min(680px, calc(100% - 28px));
      max-height: calc(100vh - 36px);
      padding: 0;
      border: 0;
      border-radius: 22px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 30px 90px rgba(25,32,29,.32);
    }
    dialog::backdrop { background: rgba(26,35,31,.58); backdrop-filter: blur(3px); }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 24px 26px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .eyebrow { margin: 0 0 6px; color: var(--gold); font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .modal-head h2 { margin: 0; font: 700 25px/1.2 Georgia, serif; }
    .publisher { margin: 7px 0 0; color: var(--muted); }
    .asset-link { display: inline-block; margin-top: 8px; color: var(--green); font-weight: 750; text-underline-offset: 3px; }
    .close {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: transparent;
      color: var(--ink);
      font-size: 20px;
    }
    .modal-body { padding: 22px 26px 8px; overflow: auto; }
    .summary { margin: 0 0 22px; color: #43504c; }
    .facts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .fact { padding: 13px; border: 1px solid var(--line); border-radius: 13px; background: #faf7f0; }
    .fact span { display: block; margin-bottom: 4px; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
    .fact strong { font-size: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label.field { display: block; color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    label.field .control { margin-top: 7px; color: var(--ink); font-size: 15px; font-weight: 400; letter-spacing: 0; text-transform: none; }
    .used-panel {
      margin-top: 17px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #faf7f0;
    }
    .checkline { display: flex; align-items: center; gap: 10px; font-weight: 750; }
    .checkline input { width: 18px; height: 18px; accent-color: var(--green); }
    .used-date { margin-top: 14px; max-width: 240px; }
    .form-message { min-height: 22px; margin: 10px 0 0; color: var(--red); font-size: 13px; }
    .modal-actions {
      position: sticky;
      bottom: 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 26px 22px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .btn { min-height: 42px; padding: 9px 16px; border: 1px solid var(--line); border-radius: 11px; background: transparent; color: var(--ink); font-weight: 750; }
    .btn.primary { border-color: var(--green); background: var(--green); color: white; }
    @media (max-width: 760px) {
      .shell { width: min(100% - 20px, 1180px); }
      .source-pill { display: none; }
      .toolbar { grid-template-columns: 1fr; }
      .list-head { display: none; }
      .asset-row { grid-template-columns: 1fr auto; }
      .asset-row .date-cell { grid-column: 1; }
      .asset-row .status { grid-column: 1; }
      .asset-row .chevron { grid-column: 2; grid-row: 1 / span 3; align-self: center; }
      .facts, .form-grid { grid-template-columns: 1fr; }
      .modal-head, .modal-body, .modal-actions { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell topbar">
      <div class="brand">
        <div class="mark">EA</div>
        <div>
          <h1>Exploration Asset Tracking</h1>
          <p>Review discoveries and record what has been used.</p>
        </div>
      </div>
      <div class="source-pill" id="sourceCount">Loading assets…</div>
    </div>
  </header>

  <main class="shell">
    <section class="workspace" aria-label="Asset tracking">
      <nav class="tabs" aria-label="Asset views">
        <button class="tab active" type="button" data-view="review">Review <span class="tab-count" id="reviewCount">0</span></button>
        <button class="tab" type="button" data-view="used">Used <span class="tab-count" id="usedCount">0</span></button>
      </nav>

      <div class="toolbar">
        <input class="control" id="search" type="search" placeholder="Search title, publisher, or summary…" aria-label="Search assets">
        <select class="control" id="category" aria-label="Filter by category">
          <option value="all">All categories</option>
        </select>
        <select class="control" id="statusFilter" aria-label="Filter by review status">
          <option value="all">All review statuses</option>
          <option value="pending">Pending</option>
          <option value="not_approved">Not Approved</option>
          <option value="approved">Approved</option>
        </select>
      </div>

      <div class="list-head">
        <span>Asset</span>
        <span id="dateHeading">Published</span>
        <span>Review status</span>
        <span></span>
      </div>
      <div class="asset-list" id="assetList">
        <div class="empty">Loading the asset registry…</div>
      </div>
    </section>
  </main>

  <dialog id="assetDialog">
    <form method="dialog" id="assetForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow" id="modalCategory"></p>
          <h2 id="modalTitle"></h2>
          <p class="publisher" id="modalPublisher"></p>
          <a class="asset-link" id="modalLink" href="#" target="_blank" rel="noopener noreferrer">Open asset ↗</a>
        </div>
        <button class="close" value="cancel" aria-label="Close dialog">×</button>
      </div>
      <div class="modal-body">
        <p class="summary" id="modalSummary"></p>
        <div class="facts">
          <div class="fact"><span>Asset type</span><strong id="modalType"></strong></div>
          <div class="fact"><span>Published</span><strong id="modalPublished"></strong></div>
          <div class="fact"><span>Added to library</span><strong id="modalAdded"></strong></div>
        </div>
        <div class="form-grid">
          <label class="field">Review status
            <select class="control" id="editStatus">
              <option value="pending">Pending</option>
              <option value="not_approved">Not Approved</option>
              <option value="approved">Approved</option>
            </select>
          </label>
        </div>
        <div class="used-panel">
          <label class="checkline">
            <input id="editUsed" type="checkbox">
            Used for an exploration activity
          </label>
          <label class="field used-date">Date used
            <input class="control" id="editUsedDate" type="date">
          </label>
        </div>
        <p class="form-message" id="formMessage" role="alert"></p>
      </div>
      <div class="modal-actions">
        <button class="btn" value="cancel">Cancel</button>
        <button class="btn primary" type="button" id="saveAsset">Save changes</button>
      </div>
    </form>
  </dialog>

  <script>
    (function () {
      "use strict";

      var state = { assets: [], view: "review", category: "all", status: "all", query: "", selectedId: null };
      var storagePrefix = "exploration-asset-tracking:";
      var assetList = document.getElementById("assetList");
      var dialog = document.getElementById("assetDialog");
      var statusFilter = document.getElementById("statusFilter");

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }

      function normalizeStatus(value) {
        return ["pending", "not_approved", "approved"].indexOf(value) >= 0 ? value : "pending";
      }

      function statusLabel(value) {
        return { pending: "Pending", not_approved: "Not Approved", approved: "Approved" }[normalizeStatus(value)];
      }

      function localState(asset) {
        try { return JSON.parse(localStorage.getItem(storagePrefix + asset.id)) || {}; }
        catch (error) { return {}; }
      }

      function current(asset) {
        var local = localState(asset);
        return Object.assign({}, asset, local, {
          review_status: normalizeStatus(local.review_status != null ? local.review_status : asset.review_status),
          used_for_exploration: local.used_for_exploration != null ? Boolean(local.used_for_exploration) : Boolean(asset.used_for_exploration),
          used_date: local.used_date !== undefined ? local.used_date : asset.used_date
        });
      }

      function isUsed(asset) {
        var item = current(asset);
        return item.used_for_exploration === true && Boolean(item.used_date);
      }

      function formatPublished(value) {
        if (!value) return "Unknown";
        var match = String(value).match(/^(\d{4})(?:-(\d{2}))?/);
        if (!match) return String(value);
        if (!match[2]) return match[1];
        var date = new Date(Number(match[1]), Number(match[2]) - 1, 1);
        return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
      }

      function formatDate(value) {
        if (!value) return "Not recorded";
        var parts = String(value).split("-");
        if (parts.length !== 3) return formatPublished(value);
        var date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
      }

      function sortDate(value) { return value ? String(value) : ""; }

      function refreshCounts() {
        var review = state.assets.filter(function (asset) { return !isUsed(asset); }).length;
        var used = state.assets.filter(isUsed).length;
        document.getElementById("reviewCount").textContent = review;
        document.getElementById("usedCount").textContent = used;
        document.getElementById("sourceCount").textContent = state.assets.length + " assets in registry";
      }

      function filteredAssets() {
        var query = state.query.trim().toLowerCase();
        var items = state.assets.map(current).filter(function (asset) {
          var used = asset.used_for_exploration === true && Boolean(asset.used_date);
          if (state.view === "used" ? !used : used) return false;
          if (state.category !== "all" && asset.category !== state.category) return false;
          if (state.view === "review" && state.status !== "all" && asset.review_status !== state.status) return false;
          if (!query) return true;
          return [asset.title, asset.source, asset.summary, asset.asset_type, asset.category]
            .join(" ").toLowerCase().indexOf(query) >= 0;
        });
        items.sort(function (a, b) {
          if (state.view === "used") return sortDate(b.used_date).localeCompare(sortDate(a.used_date)) || a.title.localeCompare(b.title);
          return sortDate(b.discovered_date).localeCompare(sortDate(a.discovered_date)) || a.title.localeCompare(b.title);
        });
        return items;
      }

      function render() {
        refreshCounts();
        var items = filteredAssets();
        document.getElementById("dateHeading").textContent = state.view === "used" ? "Date used" : "Published";
        statusFilter.style.display = state.view === "review" ? "" : "none";

        if (!items.length) {
          assetList.innerHTML = '<div class="empty"><strong>No matching assets</strong>Try changing the search or filters.</div>';
          return;
        }

        assetList.innerHTML = items.map(function (asset) {
          var shownDate = state.view === "used" ? formatDate(asset.used_date) : formatPublished(asset.published_date);
          return '<button class="asset-row" type="button" data-id="' + escapeHtml(asset.id) + '">' +
            '<div class="asset-main"><p class="asset-title">' + escapeHtml(asset.title) + '</p>' +
            '<div class="asset-meta"><span class="category-dot"></span>' + escapeHtml(asset.source || "Source not recorded") +
            ' · ' + escapeHtml(asset.category || "Uncategorized") + '</div></div>' +
            '<div class="date-cell">' + escapeHtml(shownDate) + '</div>' +
            '<span class="status ' + escapeHtml(asset.review_status) + '">' + escapeHtml(statusLabel(asset.review_status)) + '</span>' +
            '<span class="chevron">›</span></button>';
        }).join("");

        Array.prototype.forEach.call(assetList.querySelectorAll(".asset-row"), function (row) {
          row.addEventListener("click", function () { openAsset(row.getAttribute("data-id")); });
        });
      }

      function populateCategories() {
        var categories = state.assets.map(function (asset) { return asset.category; }).filter(Boolean)
          .filter(function (value, index, all) { return all.indexOf(value) === index; }).sort();
        document.getElementById("category").innerHTML = '<option value="all">All categories</option>' +
          categories.map(function (category) { return '<option value="' + escapeHtml(category) + '">' + escapeHtml(category) + '</option>'; }).join("");
      }

      function openAsset(id) {
        var original = state.assets.find(function (asset) { return asset.id === id; });
        if (!original) return;
        var asset = current(original);
        state.selectedId = id;
        document.getElementById("modalCategory").textContent = asset.category || "Uncategorized";
        document.getElementById("modalTitle").textContent = asset.title;
        document.getElementById("modalPublisher").textContent = asset.source || "Source not recorded";
        document.getElementById("modalSummary").textContent = asset.summary || "No summary recorded.";
        document.getElementById("modalType").textContent = asset.asset_type || "Resource";
        document.getElementById("modalPublished").textContent = formatPublished(asset.published_date);
        document.getElementById("modalAdded").textContent = formatDate(asset.discovered_date);
        var link = document.getElementById("modalLink");
        if (/^https?:\/\//i.test(asset.url || "")) {
          link.href = asset.url;
          link.style.display = "";
        } else {
          link.removeAttribute("href");
          link.style.display = "none";
        }
        document.getElementById("editStatus").value = asset.review_status;
        document.getElementById("editUsed").checked = Boolean(asset.used_for_exploration);
        document.getElementById("editUsedDate").value = asset.used_date || "";
        document.getElementById("editUsedDate").disabled = !asset.used_for_exploration;
        document.getElementById("formMessage").textContent = "";
        dialog.showModal();
      }

      document.getElementById("editUsed").addEventListener("change", function (event) {
        var dateInput = document.getElementById("editUsedDate");
        dateInput.disabled = !event.target.checked;
        if (!event.target.checked) dateInput.value = "";
      });

      document.getElementById("saveAsset").addEventListener("click", function () {
        var original = state.assets.find(function (asset) { return asset.id === state.selectedId; });
        if (!original) return;
        var used = document.getElementById("editUsed").checked;
        var usedDate = document.getElementById("editUsedDate").value;
        if (used && !usedDate) {
          document.getElementById("formMessage").textContent = "Add the date this asset was used.";
          return;
        }
        localStorage.setItem(storagePrefix + original.id, JSON.stringify({
          review_status: document.getElementById("editStatus").value,
          used_for_exploration: used,
          used_date: used ? usedDate : null,
          last_updated_at: new Date().toISOString()
        }));
        dialog.close();
        render();
      });

      Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (tab) {
        tab.addEventListener("click", function () {
          state.view = tab.getAttribute("data-view");
          Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (item) {
            item.classList.toggle("active", item === tab);
          });
          render();
        });
      });

      document.getElementById("search").addEventListener("input", function (event) { state.query = event.target.value; render(); });
      document.getElementById("category").addEventListener("change", function (event) { state.category = event.target.value; render(); });
      statusFilter.addEventListener("change", function (event) { state.status = event.target.value; render(); });

      fetch("./data/assets.json", { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) throw new Error("Asset registry could not be loaded.");
          return response.json();
        })
        .then(function (data) {
          state.assets = Array.isArray(data) ? data : (data.assets || []);
          populateCategories();
          render();
        })
        .catch(function (error) {
          document.getElementById("sourceCount").textContent = "Registry unavailable";
          assetList.innerHTML = '<div class="empty error"><strong>Could not load assets</strong>' + escapeHtml(error.message) + '</div>';
        });
    }());
  </script>
</body>
</html>
